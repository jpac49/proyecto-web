<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Simulador ICT</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .header-box { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .header-box img { width: 80px; opacity: 0.7; } /* Aquí iría tu imagen del edificio transparente */
        h1 { color: #1a73e8; font-size: 1.5rem; margin-left: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header-box">
            <img src="https://cdn-icons-png.flaticon.com/512/1000/1000958.png" alt="Edificio ICT">
            <h1>Simulador Nivel Señal TV</h1>
        </div>
        <form action="ejecutarLogin" method="GET">
            <input type="text" name="nombre" placeholder="Usuario (alumno1)" required>
            <input type="password" name="contrasena" placeholder="Contraseña (123)" required>
            <button type="submit">Entrar al Simulador</button>
        </form>
    </div>
</body>
</html>
